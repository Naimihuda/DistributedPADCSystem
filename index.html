<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaTech Distributed Notification System</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<div id="login" class="login-card">
<h1>NexaTech</h1>
<p class="subtitle">Distributed Notification System</p>

<label>Username</label>
<input id="username" type="text" placeholder="Enter username">

<label>Role</label>
<select id="role">
<option value="Lecturer">Lecturer</option>
<option value="Student">Student</option>
</select>

<label>Connect To</label>
<select id="serverSelect">
<option value="0">Server 1 (3000)</option>
<option value="1">Server 2 (3001)</option>
</select>

<button id="joinBtn">Join System</button>
</div>

<div id="chat" style="display:none;">
<header class="topbar">
<h2>NexaTech Notification System</h2>
<p>Connected Server: <strong id="serverName">-</strong></p>
</header>

<div class="layout">
<aside class="sidebar">
<h3>Connected Users</h3>
<ul id="userList"></ul>
</aside>

<section class="chat-area">
<div id="messageArea"></div>

<div class="composer">
<input id="messageInput" type="text" placeholder="Type your announcement or response...">
<button id="sendBtn">Send</button>
</div>
</section>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
